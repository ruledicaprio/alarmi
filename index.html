<!DOCTYPE html>
<html lang="bs" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHT Alarm Engine Dashboard</title>
  <meta name="description" content="BH Telecom Alarm Monitoring Dashboard">
  <meta name="theme-color" content="#FF6B00">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { bht: { orange: '#FF6B00', dark: '#002B5C' } } } } }
  </script>
  <style>
    body { background-color: #F4F5F7; font-family: 'Inter', sans-serif; }
    .bht-table th, .bht-table td { padding: 0.75rem 1rem; }
    .compact .bht-table th, .compact .bht-table td { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
    .badge { padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    .badge-active { background:#FEF2F2; color:#DC2626; }
    .badge-cleared { background:#F0FDF4; color:#16A34A; }
    .badge-unknown { background:#F9FAFB; color:#6B7280; }
  </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800" id="bodyView">

<header class="bg-white shadow-sm sticky top-0 z-50 border-b">
  <div class="max-w-[1600px] mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center text-white font-bold">BHT</div>
      <div>
        <h1 class="text-base font-bold">Alarm Engine <span class="text-gray-400 text-xs">v3.2</span></h1>
        <p class="text-xs text-gray-500">Sektor za energetiku</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-xs text-gray-500">Ažurirano: <span id="lastUpdate" class="font-mono">--:--</span></span>
      <button id="refreshBtn" class="p-2 hover:bg-gray-100 rounded-lg">⟳</button>
    </div>
  </div>
</header>

<main class="flex-1 max-w-[1600px] mx-auto px-4 py-6 space-y-6">
  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-xs text-gray-500">AKTIVNI ALARMI</p><p id="statActive" class="text-4xl font-bold text-red-600 mt-1">0</p></div>
    <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-xs text-gray-500">RAZRIJEŠENI (24h)</p><p id="statCleared" class="text-4xl font-bold text-green-600 mt-1">0</p></div>
    <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-xs text-gray-500">LOKACIJE</p><p id="statSites" class="text-4xl font-bold mt-1">0</p></div>
    <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-xs text-gray-500">UKUPNO TRAJANJE</p><p id="statDur" class="text-4xl font-bold text-orange-600 mt-1">0h</p></div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div class="p-4 border-b flex gap-2" id="tabsContainer">
      <button class="tab-btn active px-5 py-2 rounded-xl" data-tab="daily">📅 Dnevni</button>
      <button class="tab-btn px-5 py-2 rounded-xl" data-tab="weekly">📆 Sedmični</button>
    </div>
    <div class="overflow-x-auto max-h-[520px]">
      <table class="w-full text-sm" id="dataTable">
        <thead id="thead" class="bg-gray-50 sticky top-0 text-xs uppercase"></thead>
        <tbody id="tbody" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white p-5 rounded-2xl shadow-sm"><canvas id="chart1"></canvas></div>
    <div class="bg-white p-5 rounded-2xl shadow-sm"><canvas id="chart2"></canvas></div>
    <div class="bg-white p-5 rounded-2xl shadow-sm"><canvas id="chart3"></canvas></div>
  </div>
</main>

<script>
const state = { data: [], filtered: [], tab: 'daily', charts: {} };

const tabs = {
  daily:  { key: 'DayDur',  cnt: 'DayCnt' },
  weekly: { key: 'WeekDur', cnt: 'WeekCnt' }
};

const clean = (raw) => raw.map(r => {
  const o = {};
  for (let k in r) o[k.trim().replace(/\s/g,'')] = r[k];
  o.System = (o.System || 'Nepoznato').trim();
  o.Site = (o.Site || 'N/A').trim();
  o.Alarm = (o.Alarm || '-').trim();
  o.Region = (o.Region || 'Ostalo').trim();
  o.Status = (o.LastStatus || o.Status || 'UNKNOWN').toUpperCase();
  o.DayDur = parseFloat(o.DayDur) || 0;
  o.WeekDur = parseFloat(o.WeekDur) || 0;
  o.DayCnt = parseInt(o.DayCnt) || 0;
  o.WeekCnt = parseInt(o.WeekCnt) || 0;
  return o;
});

const fmtDur = m => m >= 1440 ? `${(m/1440).toFixed(1)}d` : m >= 60 ? `${(m/60).toFixed(1)}h` : `${Math.round(m)}m`;

const loadData = async () => {
  try {
    const res = await fetch('stats_data.json?' + Date.now());
    if (!res.ok) throw new Error('Ne mogu učitati JSON');
    
    let text = await res.text();
    if (text.startsWith('\uFEFF')) text = text.slice(1);
    const json = JSON.parse(text);

    const arr = json.Stats || json.stats || json.Recent || json.recent || json.data || [];
    state.data = clean(arr);

    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('bs-BA');
    
    renderStats();
    renderCharts();
    renderTable();
  } catch (e) {
    console.error(e);
    document.getElementById('tbody').innerHTML = `<tr><td colspan="8" class="p-8 text-center text-red-600">❌ Greška pri učitavanju podataka: ${e.message}</td></tr>`;
  }
};

const renderStats = () => {
  const active = state.data.filter(d => d.Status === 'ACTIVE').length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statCleared').textContent = state.data.filter(d => d.Status === 'CLEARED').length;
  document.getElementById('statSites').textContent = new Set(state.data.map(d => d.Site)).size;
  document.getElementById('statDur').textContent = fmtDur(state.data.reduce((a,d) => a + d.DayDur, 0));
};

const renderCharts = () => {
  const cfg = tabs[state.tab];
  const top10 = [...state.data].sort((a,b) => b[cfg.key] - a[cfg.key]).slice(0,10);

  // Chart 1 - Top 10 po trajanju
  new Chart(document.getElementById('chart1'), {
    type: 'bar',
    data: { labels: top10.map(d=>d.Site), datasets: [{ data: top10.map(d=>d[cfg.key]), backgroundColor: '#FF6B00', borderRadius: 4 }] },
    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { callback: v => fmtDur(v) } } } }
  });

  // Chart 2 - Top 20 po broju alarma
  const cnts = {};
  state.data.forEach(d => { if (d.Alarm !== '-') cnts[d.Site] = (cnts[d.Site] || 0) + 1; });
  const top20 = Object.entries(cnts).sort((a,b)=>b[1]-a[1]).slice(0,20);
  new Chart(document.getElementById('chart2'), {
    type: 'bar',
    data: { labels: top20.map(d=>d[0]), datasets: [{ data: top20.map(d=>d[1]), backgroundColor: '#002B5C' }] },
    options: { plugins: { legend: { display: false } } }
  });

  // Chart 3 - Po sistemima
  const sys = {};
  state.data.forEach(d => sys[d.System] = (sys[d.System]||0) + 1);
  const sysArr = Object.entries(sys);
  new Chart(document.getElementById('chart3'), {
    type: 'bar',
    data: { labels: sysArr.map(d=>d[0]), datasets: [{ data: sysArr.map(d=>d[1]), backgroundColor: '#10B981' }] },
    options: { indexAxis: 'y', plugins: { legend: { display: false } } }
  });
};

const renderTable = () => {
  const cfg = tabs[state.tab];
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const sorted = [...state.data].sort((a,b) => b[cfg.key] - a[cfg.key]);

  sorted.forEach(d => {
    const row = document.createElement('tr');
    row.className = 'hover:bg-orange-50';
    row.innerHTML = `
      <td class="px-4 py-3">${d.System}</td>
      <td class="px-4 py-3">${d.Region}</td>
      <td class="px-4 py-3 font-medium">${d.Site}</td>
      <td class="px-4 py-3 text-gray-600">${d.Alarm}</td>
      <td class="px-4 py-3"><span class="badge badge-${d.Status.toLowerCase()}">${d.Status}</span></td>
      <td class="px-4 py-3 font-mono font-semibold">${fmtDur(d[cfg.key])}</td>
      <td class="px-4 py-3 text-center">${d[cfg.cnt]}</td>
    `;
    tbody.appendChild(row);
  });

  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center text-gray-400">Nema podataka</td></tr>`;
  }
};

// Tabovi
document.getElementById('tabsContainer').addEventListener('click', e => {
  if (!e.target.classList.contains('tab-btn')) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  state.tab = e.target.dataset.tab;
  renderCharts();
  renderTable();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  document.getElementById('refreshBtn').textContent = '⭮';
  loadData().then(() => document.getElementById('refreshBtn').textContent = '⟳');
});

loadData();
</script>
</body>
</html>
