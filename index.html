<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHTelecom • Alarm Performance Dashboard</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <style>
    body { font-family: system-ui; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
    .container { max-width: 1480px; margin:0 auto; }
    h1 { text-align:center; font-size:2.8rem; color:#10b981; margin-bottom:4px; }
    .subtitle { text-align:center; color:#64748b; margin-bottom:30px; }
    .summary { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:20px; margin-bottom:30px; }
    .card { background:#1e2937; border-radius:20px; padding:24px; text-align:center; }
    .card-value { font-size:3rem; font-weight:700; margin-bottom:6px; }
    .card-label { font-size:0.95rem; color:#94a3b8; text-transform:uppercase; }
    .refresh-btn { background:#10b981; color:white; border:none; padding:14px 32px; border-radius:9999px; font-weight:600; display:flex; align-items:center; gap:10px; box-shadow:0 4px 6px -1px rgb(16 185 129); }
    .refresh-btn:hover { background:#059669; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BHTelecom • Alarm Performance Dashboard</h1>
    <p class="subtitle">U2020 • NetEco • Eaton • Deep Sea • Baran • Benning • IgnitionSCADA</p>

    <div class="flex justify-end mb-6">
      <button onclick="loadData()" class="refresh-btn">
        <span>↻</span> Refresh now
      </button>
      <div id="fetchStatus" class="ml-6 flex items-center text-sm"></div>
    </div>

    <div id="summary" class="summary"></div>

    <div class="bg-[#1e2937] rounded-3xl p-6 shadow-2xl overflow-auto">
      <table id="alarmTable" class="w-full text-sm">
        <thead class="bg-[#0f172a] sticky top-0">
          <tr>
            <th>ALARM_NAME</th>
            <th>SITE</th>
            <th>FIRST_OCCURRENCE</th>
            <th colspan="2">LAST_DAY</th>
            <th colspan="2">LAST_WEEK</th>
            <th colspan="2">LAST_MONTH</th>
            <th colspan="2">LAST_YEAR</th>
            <th>TOTAL_DURATION</th>
            <th>TOTAL_COUNT</th>
          </tr>
          <tr class="text-xs bg-[#0f172a]">
            <th></th><th></th><th></th>
            <th class="text-emerald-400">DUR</th><th class="text-emerald-400">COUNT</th>
            <th class="text-emerald-400">DUR</th><th class="text-emerald-400">COUNT</th>
            <th class="text-emerald-400">DUR</th><th class="text-emerald-400">COUNT</th>
            <th class="text-emerald-400">DUR</th><th class="text-emerald-400">COUNT</th>
            <th></th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const JSON_URL = "https://raw.githubusercontent.com/ruledicaprio/alarmi/main/stats_data.json";

    function parseDotNetDate(str) {
      const m = str && str.match(/\/Date\((\d+)\)\//);
      return m ? new Date(parseInt(m[1])) : null;
    }

    async function loadData() {
      const status = document.getElementById('fetchStatus');
      status.innerHTML = 'Učitavam...';

      try {
        const res = await fetch(JSON_URL, { cache: 'no-cache' });
        const data = await res.json();

        const stats = data.Stats || [];
        const recent = data.Recent || [];
        const lastUpdate = data.LastUpdate || '—';

        // FIRST OCCURRENCE iz Recent
        const firstMap = {};
        recent.forEach(r => {
          const key = `${r.Alarm}|${r.Site}`;
          const t = parseDotNetDate(r.Time);
          if (t && (!firstMap[key] || t < firstMap[key])) firstMap[key] = t;
        });

        const tableData = stats.map(s => {
          const key = `${s.Alarm}|${s.Site}`;
          const first = firstMap[key] ? firstMap[key].toLocaleString('bs-BA') : lastUpdate;
          return {
            name: s.Alarm || '—',
            site: s.Site || '—',
            first: first,
            dayDur: (s.DayDur || 0) + ' min',
            dayCount: s.DayCnt || 0,
            weekDur: (s.WeekDur || 0) + ' min',
            weekCount: s.WeekCnt || 0,
            monthDur: '—',
            monthCount: 0,
            yearDur: '—',
            yearCount: 0,
            totalDuration: '—',
            totalCount: (s.DayCnt || 0) + (s.WeekCnt || 0)
          };
        });

        // Summary
        const criticalToday = recent.filter(r => {
          const t = parseDotNetDate(r.Time);
          return t && t > new Date(Date.now() - 86400000) && r.Status === 'ACTIVE';
        }).length;

        document.getElementById('summary').innerHTML = `
          <div class="card"><div class="card-value text-red-400">${criticalToday}</div><div class="card-label">CRITICAL / POWER TODAY</div></div>
          <div class="card"><div class="card-value text-emerald-400">${recent.length}</div><div class="card-label">TOTAL EVENTS</div></div>
          <div class="card"><div class="card-value text-amber-400">${stats.length}</div><div class="card-label">UNIQUE ALARMS</div></div>
          <div class="card"><div class="card-value text-blue-400">${stats.filter(s => /NetEco|Eaton|Benning|BARAN|DeepSea/i.test(s.System)).length}</div><div class="card-label">POWER ALARMS</div></div>
        `;

        // DataTable
        if ($.fn.DataTable.isDataTable('#alarmTable')) $('#alarmTable').DataTable().destroy();
        const tbody = document.querySelector('#alarmTable tbody');
        tbody.innerHTML = tableData.map(r => `
          <tr>
            <td class="font-medium">${r.name}</td>
            <td class="text-amber-400">${r.site}</td>
            <td>${r.first}</td>
            <td class="text-emerald-400">${r.dayDur}</td><td class="font-bold">${r.dayCount}</td>
            <td class="text-emerald-400">${r.weekDur}</td><td class="font-bold">${r.weekCount}</td>
            <td class="text-emerald-400">${r.monthDur}</td><td class="font-bold">${r.monthCount}</td>
            <td class="text-emerald-400">${r.yearDur}</td><td class="font-bold">${r.yearCount}</td>
            <td class="font-medium">${r.totalDuration}</td>
            <td class="font-bold">${r.totalCount}</td>
          </tr>
        `).join('');

        new DataTable('#alarmTable', {
          paging: true, pageLength: 25, order: [[12, 'desc']], scrollX: true,
          language: { search: "Pretraži:", lengthMenu: "Prikaži _MENU_ redova" }
        });

        status.innerHTML = `✅ Live • Last update: <span class="font-medium">${lastUpdate}</span> • ${stats.length} alarmi`;

      } catch (e) {
        status.innerHTML = `❌ Greška: ${e.message}`;
      }
    }

    window.onload = loadData;
    setInterval(loadData, 60000);
  </script>
</body>
</html>
