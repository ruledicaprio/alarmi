<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>BHT Live Monitor v11 - Robusni</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <style>
        body { background: #020617; color: #e2e8f0; }
        .active-outage { border-left: 4px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; }
        .loading-spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-refresh { background: #1e293b; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .btn-refresh:hover { background: #334155; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-6 card p-6">
            <div class="flex items-center gap-4">
                <div class="bg-orange-600 px-4 py-1 rounded font-black text-2xl italic">bh</div>
                <div>
                    <h1 class="text-xl font-black uppercase tracking-tight">Network <span class="text-orange-500 italic">Core Monitor</span></h1>
                    <p id="updateTag" class="text-[10px] text-slate-500 font-mono">Povezivanje...</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="activeCount" class="text-3xl font-black text-red-500">0</div>
                <button id="manualRefreshBtn" class="btn-refresh flex items-center gap-1">🔄 Ručno</button>
            </div>
        </div>

        <div class="card p-6">
            <table id="alarmTable" class="w-full text-sm">
                <thead>
                    <tr class="text-left text-[10px] text-slate-500 uppercase border-b border-slate-800">
                        <th class="pb-3">Lokacija (Unificirano)</th>
                        <th class="pb-3">Direkcija</th>
                        <th class="pb-3">Alarm / Kategorija</th>
                        <th class="pb-3 text-center">Danas (CNT)</th>
                        <th class="pb-3 text-center">Downtime (Min)</th>
                        <th class="pb-3 text-center">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" class="text-center py-10 text-slate-500">Učitavanje podataka...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            let dataTable = null;           // DataTables instanca
            let abortController = null;     // za prekid prethodnog fetcha
            let refreshTimer = null;         // setInterval ID
            let isRefreshing = false;        // lock

            // Funkcija za prikaz loading state-a
            function setLoading(loading) {
                const btn = document.getElementById('manualRefreshBtn');
                if (loading) {
                    btn.innerHTML = '<span class="loading-spinner"></span> Osvježavam...';
                    btn.disabled = true;
                } else {
                    btn.innerHTML = '🔄 Ručno';
                    btn.disabled = false;
                }
            }

            // Glavna funkcija za dohvat i prikaz
            async function refreshData(showLoadingIndicator = false) {
                // Spriječi paralelne pozive
                if (isRefreshing) {
                    console.log('Već se osvježava, preskačem...');
                    return;
                }
                isRefreshing = true;
                if (showLoadingIndicator) setLoading(true);

                // Prekini prethodni fetch ako postoji
                if (abortController) abortController.abort();
                abortController = new AbortController();

                try {
                    const response = await fetch('stats_data.json?cache=' + Date.now(), {
                        signal: abortController.signal
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status} - Server ne vraća JSON`);

                    const data = await response.json();
                    
                    // Validacija strukture
                    if (!data || !data.Stats || !Array.isArray(data.Stats)) {
                        throw new Error('Neispravan JSON format: nedostaje .Stats');
                    }

                    // Ažuriraj zaglavlje
                    document.getElementById('updateTag').innerHTML = `📡 Zadnji sync: ${data.LastUpdate || 'nepoznat'}`;
                    const activeCount = data.Stats.filter(s => s.Status === 'ACTIVE').length;
                    document.getElementById('activeCount').innerHTML = activeCount + ' Aktivno';

                    // Ako DataTables već postoji, ažuriraj podatke (ne uništavaj)
                    if (dataTable) {
                        // Očisti tabelu i dodaj nove redove
                        dataTable.clear();
                        const rows = data.Stats.map(s => [
                            s.Site || '',
                            s.Region || 'N/A',
                            `${s.Alarm || ''} <span class="text-[10px] text-slate-600 ml-2">[${s.System || ''}]</span>`,
                            s.DayCnt || 0,
                            s.DayDur || 0,
                            `<span class="${s.Status === 'ACTIVE' ? 'text-red-500 animate-pulse font-black' : 'text-slate-600 text-[10px]'} uppercase">${s.Status || ''}</span>`
                        ]);
                        dataTable.rows.add(rows);
                        dataTable.draw();
                    } else {
                        // Prvo punjenje: inicijaliziraj DataTables
                        const rows = data.Stats.map(s => [
                            s.Site || '',
                            s.Region || 'N/A',
                            `${s.Alarm || ''} <span class="text-[10px] text-slate-600 ml-2">[${s.System || ''}]</span>`,
                            s.DayCnt || 0,
                            s.DayDur || 0,
                            `<span class="${s.Status === 'ACTIVE' ? 'text-red-500 animate-pulse font-black' : 'text-slate-600 text-[10px]'} uppercase">${s.Status || ''}</span>`
                        ]);
                        dataTable = $('#alarmTable').DataTable({
                            data: rows,
                            columns: [
                                { title: "Lokacija (Unificirano)", className: "font-bold text-slate-200" },
                                { title: "Direkcija", className: "text-slate-500 text-xs" },
                                { title: "Alarm / Kategorija", className: "text-orange-400 font-medium" },
                                { title: "Danas (CNT)", className: "text-center font-black" },
                                { title: "Downtime (Min)", className: "text-center font-mono text-emerald-400" },
                                { title: "Status", className: "text-center" }
                            ],
                            order: [[4, 'desc']],  // sortiraj po trajanju (indeks 4)
                            pageLength: 25,
                            language: { search: "Pretraga:", info: "Prikazano _START_ do _END_ od _TOTAL_ zapisa" }
                        });
                    }

                    // Primijeni CSS klasu za aktivne alarme na svakom redu
                    // DataTables ne čuva originalne klase, pa ih dodajemo nakon crtanja
                    $('#alarmTable tbody tr').each(function(idx) {
                        const rowData = dataTable.row(idx).data();
                        if (rowData && rowData[5] && rowData[5].includes('ACTIVE')) {
                            $(this).addClass('active-outage');
                        } else {
                            $(this).removeClass('active-outage');
                        }
                    });

                } catch (err) {
                    if (err.name === 'AbortError') {
                        console.log('Fetch prekinut (normalno)');
                        return;
                    }
                    console.error('Greška pri refreshu:', err);
                    document.getElementById('updateTag').innerHTML = `⚠️ Greška: ${err.message} (pokušaj ponovo za 5s)`;
                    // Ne brišemo postojeću tabelu, samo pokažemo grešku
                } finally {
                    isRefreshing = false;
                    if (showLoadingIndicator) setLoading(false);
                }
            }

            // Ručno osvježavanje (sa loading indikatorom)
            document.getElementById('manualRefreshBtn').addEventListener('click', () => {
                refreshData(true);
            });

            // Automatsko osvježavanje svakih 30 sekundi (bez loading indikatora da ne smeta)
            refreshTimer = setInterval(() => refreshData(false), 30000);

            // Prvo učitavanje (sa loadingom)
            refreshData(true);

            // Opciono: prekini timer ako se stranica ugasi (čisto)
            window.addEventListener('beforeunload', () => {
                if (refreshTimer) clearInterval(refreshTimer);
                if (abortController) abortController.abort();
                if (dataTable) dataTable.destroy();
            });
        })();
    </script>
</body>
</html>
