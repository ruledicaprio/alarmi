<!DOCTYPE html>
<html lang="bs" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHT Alarm Engine Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      content: ["./index.html"],
      theme: {
        extend: {
          colors: {
            bht: { orange: '#FF6B00', dark: '#002B5C', bg: '#F8F9FC' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --scrollbar-thumb: #cbd5e1;
    }
    
    body {
      background: #F8F9FC;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* Modern card & shadow */
    .card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    /* Table optimizations */
    .bht-table {
      border-collapse: collapse;
    }
    .bht-table th {
      background: #f8fafc;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bht-table td {
      padding: 14px 16px;
      font-size: 0.875rem;
    }
    .bht-table tr:hover {
      background: #fffbeb;
    }

    /* Badge */
    .badge {
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-active   { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
    .badge-cleared  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-unknown  { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

    /* Scrollbar */
    .overflow-x-auto::-webkit-scrollbar,
    .overflow-y-auto::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    .overflow-x-auto::-webkit-scrollbar-thumb,
    .overflow-y-auto::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 20px;
    }

    /* Tab buttons */
    .tab-btn {
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: white;
      color: #FF6B00;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      border-bottom: 3px solid #FF6B00;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-[#FF6B00] text-white rounded-2xl flex items-center justify-center text-xl font-bold shadow-inner">B</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight text-[#002B5C]">Alarm Engine</h1>
          <p class="text-xs text-slate-500 -mt-1">Sektor za energetiku • Real-time</p>
        </div>
      </div>
      
      <div class="flex items-center gap-x-6">
        <div class="text-sm text-slate-500 font-medium">
          Ažurirano: <span id="lastUpdate" class="font-mono text-slate-700"></span>
        </div>
        <button id="refreshBtn" class="flex items-center gap-x-2 px-5 py-2.5 bg-white hover:bg-orange-50 text-[#FF6B00] rounded-2xl border border-orange-200 hover:border-orange-300 transition-all font-medium text-sm">
          <span class="text-lg leading-none">⟳</span>
          <span>Osvježi</span>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-screen-2xl mx-auto px-6 py-8 w-full space-y-8">

    <!-- STATS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <div class="card bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <p class="text-xs font-semibold tracking-widest text-slate-500">AKTIVNI ALARMI</p>
        <p id="statActive" class="text-6xl font-semibold text-red-600 mt-3">0</p>
      </div>
      <div class="card bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <p class="text-xs font-semibold tracking-widest text-slate-500">RAZRIJEŠENI 24h</p>
        <p id="statCleared" class="text-6xl font-semibold text-emerald-600 mt-3">0</p>
      </div>
      <div class="card bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <p class="text-xs font-semibold tracking-widest text-slate-500">LOKACIJE</p>
        <p id="statSites" class="text-6xl font-semibold text-[#002B5C] mt-3">0</p>
      </div>
      <div class="card bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <p class="text-xs font-semibold tracking-widest text-slate-500">UKUPNO TRAJANJE</p>
        <p id="statDur" class="text-6xl font-semibold text-[#FF6B00] mt-3">0h</p>
      </div>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-6 pt-5 pb-3 flex gap-2 border-b" id="tabsContainer">
        <button data-tab="daily" class="tab-btn active px-8 py-3 rounded-2xl text-sm font-semibold">📅 Dnevni pregled</button>
        <button data-tab="weekly" class="tab-btn px-8 py-3 rounded-2xl text-sm font-semibold">📆 Sedmični pregled</button>
      </div>
      
      <div class="overflow-auto max-h-[520px]" id="tableContainer">
        <table class="bht-table w-full text-sm" id="dataTable">
          <thead id="thead"></thead>
          <tbody id="tbody" class="text-slate-700"></tbody>
        </table>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <h3 class="font-semibold text-slate-700 mb-4">Top 10 po trajanju</h3>
        <canvas id="chart1" class="h-72"></canvas>
      </div>
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <h3 class="font-semibold text-slate-700 mb-4">Top 15 po broju alarma</h3>
        <canvas id="chart2" class="h-72"></canvas>
      </div>
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <h3 class="font-semibold text-slate-700 mb-4">Alarmi po sistemu</h3>
        <canvas id="chart3" class="h-72"></canvas>
      </div>
    </div>
  </main>

  <footer class="text-center py-6 text-xs text-slate-400 border-t bg-white">
    © 2026 BH Telecom • Alarm Engine Dashboard • Powered by BHT Engine v3.5
  </footer>

<script>
  // ... (JavaScript ostaje isti kao u prethodnoj verziji koju sam ti poslao, samo sa manjim optimizacijama)
  // Ako želiš, mogu ti poslati i optimizirani JS dio posebno.
</script>
</body>
</html>
