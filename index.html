<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>BHT Core v13.2</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
        /* Pastel Colors for Active */
        .active-critical { background-color: #442726 !important; color: #ff8182 !important; border-left: 4px solid #ff4444; }
        .active-warning { background-color: #443b26 !important; color: #ffd381 !important; }
        /* Dark for Cleared */
        .status-cleared { color: #484f58 !important; opacity: 0.5; }
        .tab-btn { transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-active { color: #f97316; border-bottom-color: #f97316; }
        .dataTables_wrapper { padding: 10px; }
        input[type="search"] { background: #161b22; border: 1px solid #30363d; color: white; border-radius: 4px; padding: 4px 10px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-4 card p-4">
            <div class="flex items-center gap-4">
                <div class="bg-orange-600 text-white px-3 py-1 rounded font-bold">BHT</div>
                <h1 class="text-lg font-bold uppercase tracking-tighter">Network Monitor <span class="text-slate-600 text-xs">v13.2</span></h1>
            </div>
            <div class="flex gap-8">
                <button onclick="setTab('daily')" id="b-daily" class="tab-btn tab-active font-bold text-sm uppercase">Dnevni Alarmi</button>
                <button onclick="setTab('weekly')" id="b-weekly" class="tab-btn text-slate-500 font-bold text-sm uppercase">Sedmični Report</button>
            </div>
            <div id="syncTag" class="text-xs font-mono text-slate-500 italic">Syncing...</div>
        </div>

        <div class="card overflow-hidden">
            <table id="mainTable" class="w-full text-sm"></table>
        </div>
    </div>

    <script>
        let currentTab = 'daily';
        let table = null;

        async function update() {
            try {
                const r = await fetch('stats_data.json?t=' + Date.now());
                const d = await r.json();
                document.getElementById('syncTag').innerText = `Zadnji Sync: ${d.LastUpdate}`;
                
                const cols = currentTab === 'daily' ? [
                    { title: "Sistem", data: "System" },
                    { title: "Direkcija", data: "Region" },
                    { title: "Lokacija", data: "Site" },
                    { title: "Alarm", data: "Alarm" },
                    { title: "Count", data: "DayCnt" },
                    { title: "Trajanje (min)", data: "DayDur" },
                    { title: "Status", data: "LastStatus" }
                ] : [
                    { title: "Sistem", data: "System" },
                    { title: "Direkcija", data: "Region" },
                    { title: "Lokacija", data: "Site" },
                    { title: "Alarm", data: "Alarm" },
                    { title: "Ukupno (Count)", data: "WeekCnt" },
                    { title: "Ukupno (Min)", data: "WeekDur" }
                ];

                if (table) table.destroy();
                $('#mainTable').empty();

                table = $('#mainTable').DataTable({
                    data: currentTab === 'daily' ? d.Daily : d.Weekly,
                    columns: cols,
                    order: [[4, 'desc']],
                    pageLength: 25,
                    createdRow: function(row, data) {
                        if (currentTab === 'daily') {
                            if (data.LastStatus === 'CLEARED') $(row).addClass('status-cleared');
                            else if (data.Alarm.includes('Failure') || data.Alarm.includes('Critical')) $(row).addClass('active-critical');
                            else $(row).addClass('active-warning');
                        }
                    }
                });
            } catch (e) { console.error("Sync Error", e); }
        }

        function setTab(t) {
            currentTab = t;
            $('.tab-btn').removeClass('tab-active text-orange-500').addClass('text-slate-500');
            $(`#b-${t}`).addClass('tab-active text-orange-500');
            update();
        }

        setInterval(update, 30000);
        update();
    </script>
</body>
</html>
