<script>
    let table = null;

    async function update() {
        try {
            const r = await fetch('stats_data.json?t=' + Date.now());
            const d = await r.json();
            document.getElementById('syncTag').innerText = `Zadnji Sync: ${d.LastUpdate}`;

            if (table) {
                table.clear().rows.add(d.Daily).draw(false);
            } else {
                table = $('#mainTable').DataTable({
                    data: d.Daily,
                    columns: [
                        { data: "System", defaultContent: "N/A" },
                        { data: "Region", defaultContent: "N/A" },
                        { data: "Site", defaultContent: "N/A" },
                        { data: "Alarm", defaultContent: "N/A" },
                        { data: "LastTime", defaultContent: "---" },
                        { data: "DayCnt", defaultContent: "0" },
                        { data: "DayDur", defaultContent: "0" },
                        { data: "LastStatus", defaultContent: "N/A" }
                    ],
                    order: [[7, 'asc'], [4, 'desc']],
                    pageLength: 25,
                    createdRow: function(row, data) {
                        if (data.LastStatus === 'CLEARED') $(row).addClass('status-cleared');
                        else if (data.LastStatus === 'ACTIVE') $(row).addClass('active-row');
                    }
                });
            }
        } catch (e) { console.error("Data error..."); }
    }

    setInterval(update, 30000);
    update();
</script>
