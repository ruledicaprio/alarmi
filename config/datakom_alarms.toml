# DATAKOM D-500 MK3 — alarm bit definitions
# Source: "500 Modbus Application Manual" rev 03 (firmware 5.6)
#
# Bit numbering is shared across all three 256-bit register ranges:
#   10504–10519  Shutdown alarms  → severity = critical
#   10520–10535  Loaddump alarms  → severity = major
#   10536–10551  Warning alarms   → severity = warning
#
# Bits 0–7:   on-board digital input alarms (user-configurable names)
# Bits 8–47:  expansion input alarms (user-configurable names)
# Bits 48+:   internal/system alarms (fixed names from firmware)
# Bits 142–255: reserved

# --- Digital input alarms (default names, customise per deployment) ---
[[alarm]]
bit = 0
name = "Digital Input 1"
class = "UNCLASSIFIED"

[[alarm]]
bit = 1
name = "Digital Input 2"
class = "UNCLASSIFIED"

[[alarm]]
bit = 2
name = "Digital Input 3"
class = "UNCLASSIFIED"

[[alarm]]
bit = 3
name = "Digital Input 4"
class = "UNCLASSIFIED"

[[alarm]]
bit = 4
name = "Digital Input 5"
class = "UNCLASSIFIED"

[[alarm]]
bit = 5
name = "Digital Input 6"
class = "UNCLASSIFIED"

[[alarm]]
bit = 6
name = "Digital Input 7"
class = "UNCLASSIFIED"

[[alarm]]
bit = 7
name = "Digital Input 8"
class = "UNCLASSIFIED"

