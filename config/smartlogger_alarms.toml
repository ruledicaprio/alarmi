# Huawei SmartLogger 3000 alarm bitmap definitions, per
# "SmartLogger ModBus Interface Definitions" Issue 35 (2020-02-20), section 2.2.
# Alarm bitmaps are at register addresses 50000 / 50001 / 50002 (NOT the
# 32008-range — that's the *power meter*, not the SmartLogger).
# class/severity must match the bht-normalize canonical enums.

# ===== Register 50000 =====

[[alarm]]
addr = 50000
bit  = 3
name = "Abnormal Active Schedule (Alarm 1100)"
class = "GENERIC_ERROR"
severity = "major"

[[alarm]]
addr = 50000
bit  = 11
name = "Abnormal Reactive Schedule (Alarm 1101)"
class = "GENERIC_ERROR"
severity = "major"

